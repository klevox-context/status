<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Aibuku "A" monogram: rounded geometric strokes in brand ink -->
  <g stroke="#0F1B2D" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- left leg -->
    <path d="M6 27 L13.4 6.5" />
    <!-- right leg -->
    <path d="M22.5 27 L15.1 6.5" />
    <!-- curved crossbar echoing the wordmark's soft apex -->
    <path d="M8.6 20.4 Q14.25 17.6 19.9 20.4" />
  </g>
  <!-- brand orange accent dot (echoes the "i" tittle) -->
  <circle cx="24.4" cy="8.4" r="3" fill="#F5771F" />
</svg>
